version: "3.8"

services:
  network-agent:
    build: .
    container_name: network-agent
    restart: unless-stopped
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.5}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_CRITICAL_CHAT_ID: ${TELEGRAM_CRITICAL_CHAT_ID:-}
      QUIET_HOURS: ${QUIET_HOURS:-}
      NETDATA_BASE_URL: ${NETDATA_BASE_URL:-http://netdata:19999}
      REPORT_HOUR: ${REPORT_HOUR:-8}
      REPORT_INTERVAL_HOURS: ${REPORT_INTERVAL_HOURS:-}
      TELEGRAM_AUTHORIZED_USERS: ${TELEGRAM_AUTHORIZED_USERS:-}
      LOG_PATH: ${LOG_PATH:-/host/logs/auth.log}
      RESET_BASELINE: ${RESET_BASELINE:-false}
      TTS_MODEL: ${TTS_MODEL:-openai/gpt-4o-mini-tts-2025-12-15}
      TTS_VOICE: ${TTS_VOICE:-alloy}
      TTS_AS_VOICE_MESSAGE: ${TTS_AS_VOICE_MESSAGE:-true}
      TTS_MAX_CHARS: ${TTS_MAX_CHARS:-3000}
      TTS_SPEED: ${TTS_SPEED:-1.0}
    volumes:
      - /var/log:/host/logs:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - /root:/host/root:ro
      - /home:/host/home:ro
      - /var/spool/cron:/host/var/spool/cron:ro
      - /run:/host/run:ro
      - /var/lib/apt:/host/var/lib/apt:ro
      - /var/lib/dpkg:/host/var/lib/dpkg:ro
      - /var/lib/fail2ban:/host/var/lib/fail2ban:ro
      - /var/cache/apt:/host/var/cache/apt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - network-agent-state:/state
    networks:
      - monitoring

volumes:
  network-agent-state:

networks:
  monitoring:
    external: true
